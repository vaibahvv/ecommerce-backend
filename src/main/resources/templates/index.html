<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My E-commerce App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        /* Navbar */
        nav {
            background-color: #333;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }
        nav a:hover {
            color: #4CAF50;
        }
        /* Hero */
        .hero {
            background-image: url('https://via.placeholder.com/1500x400');
            background-size: cover;
            background-position: center;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 1px 1px 5px black;
        }
        .hero h1 {
            font-size: 50px;
        }
        .hero a.button {
            margin-top: 20px;
            padding: 15px 30px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            font-size: 20px;
            border-radius: 5px;
        }
        /* Products Grid */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }
        .product-card {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            padding-bottom: 20px;
        }
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .product-card h3 {
            margin: 15px 0 5px 0;
        }
        .product-card p {
            margin: 0;
            color: #555;
        }
        .product-card a.button {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .product-card a.button:hover {
            background-color: #45a049;
        }
        /* Footer */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
<!-- Navbar -->
<nav>
    <div class="logo"><a href="/">E-Shop</a></div>
    <div class="menu">
        <a href="/">Home</a>
        <a href="#">Products</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- Hero Banner -->
<div class="hero">
    <div>
        <h1>Welcome to E-Shop!</h1>
        <a href="#" class="button">Shop Now</a>
    </div>
</div>

<!-- Products Grid -->
<div class="products">
    <div class="product-card">
        <img src="https://via.placeholder.com/300x200" alt="Product 1">
        <h3>Product 1</h3>
        <p>$49.99</p>
        <a href="#" class="button">Buy Now</a>
    </div>
    <div class="product-card">
        <img src="https://via.placeholder.com/300x200" alt="Product 2">
        <h3>Product 2</h3>
        <p>$29.99</p>
        <a href="#" class="button">Buy Now</a>
    </div>
    <div class="product-card">
        <img src="https://via.placeholder.com/300x200" alt="Product 3">
        <h3>Product 3</h3>
        <p>$19.99</p>
        <a href="#" class="button">Buy Now</a>
    </div>
    <div class="product-card">
        <img src="https://via.placeholder.com/300x200" alt="Product 4">
        <h3>Product 4</h3>
        <p>$99.99</p>
        <a href="#" class="button">Buy Now</a>
    </div>
</div>

<!-- Footer -->
<footer>
    &copy; 2026 E-Shop. All Rights Reserved.
</footer>
</body>
</html>
